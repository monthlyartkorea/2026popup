<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간미술 팝업스토어 - 나도 기자다!</title>
    <style>
        :root {
            --primary-color: #111111;
            --accent-color: #E31B23;
            --bg-color: #F9F9F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-color);
            letter-spacing: -1px;
        }

        .header p {
            font-size: 14px;
            color: #666;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .input-group input[type="text"],
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--accent-color);
        }

        .input-group textarea {
            height: 80px;
            resize: none;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border: 1px dashed #bbb;
        }

        #imageInput {
            display: none;
        }

        /* 정사각형 회색 박스 유지 */
        .preview-outer {
            width: 100%;
            margin: 20px 0;
            background: #eee;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #eee;
            overflow: hidden;
        }

        #uploadedImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
        }

        .preview-area.has-image #uploadedImage {
            opacity: 1;
        }

        .preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #aaa;
            font-size: 15px;
            line-height: 1.5;
            padding: 20px;
        }

        .preview-area.has-image .preview-placeholder {
            display: none;
        }

        .magazine-logo-overlay {
            position: absolute;
            top: 4%;
            left: 4%;
            width: 92%;
            height: auto;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .mag-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            padding: 14px 18px;
            z-index: 2;
            border-top: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        .mag-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #111;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mag-reporter {
            font-size: 11px;
            color: var(--accent-color);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn {
            width: 100%;
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn:hover {
            background: #333;
        }

        .btn-accent {
            background: var(--accent-color);
        }

        .btn-accent:hover {
            background: #b81319;
        }

        .btn-light {
            background: #f0f0f0;
            color: #111;
        }

        .btn-light:hover {
            background: #e0e0e0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content p {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
            margin: 14px 0 18px;
        }

        .modal-content strong {
            color: var(--accent-color);
        }

        #finalImage {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border-radius: 8px;
            background: #eee;
            border: 1px solid #eee;
            display: block;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>월간미술</h1>
        <p>팝업 특별 에디션 — 나도 일일 기자다!</p>
    </div>

    <div class="input-group">
        <label class="file-label" for="imageInput">📸 현장 취재 사진 등록하기</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label for="reporterName">기자 이름 (닉네임)</label>
        <input type="text" id="reporterName" placeholder="예: 홍길동 객원기자" value="홍길동 객원기자">
    </div>

    <div class="input-group">
        <label for="articleTitle">기사 헤드라인 (제목)</label>
        <input type="text" id="articleTitle" placeholder="전시를 관통하는 한 줄 평을 적어주세요." value="성수동을 물들인 아날로그 예술의 향연">
    </div>

    <div class="input-group">
        <label for="articleContent">기사 본문 (인스타그램 게시글용)</label>
        <textarea id="articleContent" placeholder="팝업스토어에서 느낀 생생한 취재 후기를 작성해 주세요."></textarea>
    </div>

    <div class="preview-outer">
        <div class="preview-area" id="magazinePreview">
            <img id="uploadedImage" alt="미리보기 이미지">
            <div class="preview-placeholder">
                사진을 업로드하면<br>
                정사각형 기사 이미지로 표시됩니다
            </div>

            <!-- Month.png를 HTML 파일과 같은 폴더에 두세요 -->
            <img class="magazine-logo-overlay" id="logoOverlay" src="./Month.png" alt="월간미술 제호">

            <div class="mag-info">
                <div class="mag-title" id="previewTitle">성수동을 물들인 아날로그 예술의 향연</div>
                <div class="mag-reporter" id="previewReporter">BY 홍길동 객원기자</div>
            </div>
        </div>
    </div>

    <button class="btn btn-accent" onclick="generateAndCopy()">📰 기사 완성 및 텍스트 복사하기</button>
</div>

<div class="modal" id="guideModal">
    <div class="modal-content">
        <h3>🎉 기사 이미지 완성!</h3>

        <img id="finalImage" alt="완성된 월간미술 기사 이미지">

        <p>
            제호가 합성된 이미지가 생성되었습니다.<br>
            인스타그램 본문에 들어갈 <strong>취재 글과 필수 해시태그도 자동 복사</strong>되었습니다.
        </p>

        <a id="downloadFinalImage" class="btn btn-accent" download="monthly_art_report.png">이미지 저장하기</a>
        <button class="btn" onclick="goToInstagram()">📱 인스타그램 앱 열기</button>
        <button class="btn btn-light" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    const INSTAGRAM_ID = "monthly_art";
    const LOGO_SRC = "./Month.png";

    const imageInput = document.getElementById('imageInput');
    const uploadedImage = document.getElementById('uploadedImage');
    const magazinePreview = document.getElementById('magazinePreview');

    const reporterName = document.getElementById('reporterName');
    const articleTitle = document.getElementById('articleTitle');
    const articleContent = document.getElementById('articleContent');

    const previewReporter = document.getElementById('previewReporter');
    const previewTitle = document.getElementById('previewTitle');

    const finalImage = document.getElementById('finalImage');
    const downloadFinalImage = document.getElementById('downloadFinalImage');

    let uploadedImageSrc = null;

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {
            uploadedImageSrc = event.target.result;
            uploadedImage.src = uploadedImageSrc;
            magazinePreview.classList.add('has-image');
        };

        reader.readAsDataURL(file);
    });

    reporterName.addEventListener('input', () => {
        previewReporter.innerText = `BY ${reporterName.value}`;
    });

    articleTitle.addEventListener('input', () => {
        previewTitle.innerText = articleTitle.value || '기사 제목을 입력해주세요';
    });

    function copyTextToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }

        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);

        return Promise.resolve();
    }

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();

            if (/^https?:\/\//.test(src)) {
                img.crossOrigin = "anonymous";
            }

            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
        });
    }

    function drawCoverImage(ctx, img, x, y, width, height) {
        const imgRatio = img.width / img.height;
        const boxRatio = width / height;

        let drawWidth, drawHeight, offsetX, offsetY;

        if (imgRatio > boxRatio) {
            drawHeight = height;
            drawWidth = height * imgRatio;
            offsetX = x - (drawWidth - width) / 2;
            offsetY = y;
        } else {
            drawWidth = width;
            drawHeight = width / imgRatio;
            offsetX = x;
            offsetY = y - (drawHeight - height) / 2;
        }

        ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
    }

    function drawSingleLineEllipsis(ctx, text, x, y, maxWidth) {
        let safeText = text || '';
        if (ctx.measureText(safeText).width <= maxWidth) {
            ctx.fillText(safeText, x, y);
            return;
        }

        while (safeText.length > 0 && ctx.measureText(safeText + '…').width > maxWidth) {
            safeText = safeText.slice(0, -1);
        }

        ctx.fillText(safeText + '…', x, y);
    }

    async function makeFinalImage() {
        const canvas = document.createElement('canvas');
        const size = 1080;

        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext('2d');

        ctx.fillStyle = "#eeeeee";
        ctx.fillRect(0, 0, size, size);

        if (uploadedImageSrc) {
            const photo = await loadImage(uploadedImageSrc);
            drawCoverImage(ctx, photo, 0, 0, size, size);
        } else {
            ctx.fillStyle = "#aaaaaa";
            ctx.font = "700 38px Pretendard, Apple SD Gothic Neo, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("사진을 업로드해주세요", size / 2, size / 2);
            ctx.textAlign = "left";
        }

        try {
            const logo = await loadImage(LOGO_SRC);
            const logoWidth = size * 0.92;
            const logoHeight = logoWidth * (logo.height / logo.width);

            ctx.globalCompositeOperation = "multiply";
            ctx.drawImage(
                logo,
                size * 0.04,
                size * 0.04,
                logoWidth,
                logoHeight
            );
            ctx.globalCompositeOperation = "source-over";
        } catch (error) {
            console.warn("제호 이미지를 불러오지 못했습니다. Month.png 경로를 확인해주세요.", error);
        }

        const infoHeight = 160;
        const infoY = size - infoHeight;

        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.fillRect(0, infoY, size, infoHeight);

        ctx.strokeStyle = "rgba(0,0,0,0.06)";
        ctx.beginPath();
        ctx.moveTo(0, infoY);
        ctx.lineTo(size, infoY);
        ctx.stroke();

        ctx.fillStyle = "#111111";
        ctx.font = "700 44px Pretendard, Apple SD Gothic Neo, sans-serif";
        drawSingleLineEllipsis(
            ctx,
            articleTitle.value || "기사 제목을 입력해주세요",
            48,
            infoY + 65,
            size - 96
        );

        ctx.fillStyle = "#E31B23";
        ctx.font = "700 30px Pretendard, Apple SD Gothic Neo, sans-serif";
        drawSingleLineEllipsis(
            ctx,
            `BY ${reporterName.value || "월간미술 객원기자"}`,
            48,
            infoY + 112,
            size - 96
        );

        return canvas.toDataURL("image/png");
    }

    async function generateAndCopy() {
        const titleText = articleTitle.value ? `[취재] "${articleTitle.value}"\n\n` : '';
        const bodyText = articleContent.value || '월간미술 오프라인 팝업스토어 현장에 다녀왔습니다. 감각적인 공간과 예술적 영감이 가득한 현장을 직접 확인해 보세요!';
        const hashtagText = `\n\n---\n✍️ 월간미술 일일 객원기자 취재기\n#월간미술 #월간미술팝업 #나도기자다 @${INSTAGRAM_ID}`;

        const fullText = `${titleText}${bodyText}${hashtagText}`;

        try {
            const imageDataUrl = await makeFinalImage();

            finalImage.src = imageDataUrl;
            downloadFinalImage.href = imageDataUrl;

            await copyTextToClipboard(fullText);

            showModal();
        } catch (error) {
            alert("이미지 생성 중 문제가 생겼습니다. 제호 이미지 경로나 업로드한 사진 파일을 확인해주세요.");
            console.error(error);
        }
    }

    function showModal() {
        document.getElementById('guideModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('guideModal').style.display = 'none';
    }

    function getMobileOS() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        if (/android/i.test(ua)) return "android";

        if (
            /iPad|iPhone|iPod/.test(ua) ||
            (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
        ) {
            return "ios";
        }

        return "other";
    }

    function goToInstagram() {
        const fallbackUrl = `https://www.instagram.com/${INSTAGRAM_ID}/`;
        const os = getMobileOS();

        if (os === "android") {
            const encodedFallback = encodeURIComponent(fallbackUrl);

            window.location.href =
                `intent://camera#Intent;scheme=instagram;package=com.instagram.android;S.browser_fallback_url=${encodedFallback};end`;
        } else if (os === "ios") {
            window.location.href = "instagram://camera";

            setTimeout(() => {
                if (!document.hidden) {
                    window.location.href = fallbackUrl;
                }
            }, 1200);
        } else {
            window.open(fallbackUrl, "_blank");
        }
    }
</script>

</body>
</html>
